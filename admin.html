<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Admin</title>
    
    <!-- CSS TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- POLICE -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CONFIG TAILWIND -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { rajdhani: ['Rajdhani', 'sans-serif'], orbitron: ['Orbitron', 'sans-serif'] },
                    colors: {
                        neonBlue: '#00f3ff',
                        neonPurple: '#bc13fe',
                        darkBg: '#050505',
                    }
                } 
            }
        }
    </script>

    <!-- STYLES -->
    <style>
        /* 1. Body */
        body { 
            background-color: #f3f4f6; 
            color: #1f2937; 
            font-family: 'Rajdhani', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        html.dark body {
            background-color: #050505; 
            color: #e5e7eb;
        }

        /* 2. Cartes */
        .glass { 
            background: #ffffff; 
            border: 1px solid #e5e7eb; 
            color: #1f2937;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        html.dark .glass { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); 
            color: white;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* 3. Inputs */
        .input-field { 
            background: #f3f4f6; 
            border: 1px solid #d1d5db; 
            color: #111827; 
            display: block; /* Force le bloc pour l'alignement vertical */
            width: 100%;
            transition: all 0.3s;
        }
        html.dark .input-field { 
            background: rgba(0,0,0,0.5); 
            border: 1px solid #333; 
            color: white; 
        }
        .input-field:focus { outline: none; border-color: #00f3ff; box-shadow: 0 0 0 2px rgba(0, 243, 255, 0.2); }

        /* Table Rows Hover */
        tr.hover-row:hover td { background-color: rgba(0, 0, 0, 0.02); }
        html.dark tr.hover-row:hover td { background-color: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen">

    <!-- ÉCRAN DE CONNEXION -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-8 rounded-xl w-full max-w-md text-center relative">
            
            <!-- Bouton Thème -->
            <button onclick="toggleTheme()" class="absolute top-4 right-4 p-2 rounded-full border border-gray-300 dark:border-white/20 hover:bg-gray-200 dark:hover:bg-white/10 transition text-gray-800 dark:text-white">
                <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>

            <h2 class="text-3xl font-bold mb-2 text-gray-900 dark:text-white font-orbitron">ACCÈS ADMIN</h2>
            <p class="text-gray-500 dark:text-gray-400 mb-6 text-sm">Gestion NextGen Store</p>
            
            <input type="email" id="email" placeholder="Email Admin" class="input-field mb-4 rounded-lg">
            <input type="password" id="password" placeholder="Mot de passe" class="input-field mb-6 rounded-lg">
            
            <button onclick="login()" class="w-full bg-neonBlue text-black font-bold py-3 rounded hover:bg-white transition mb-4">SE CONNECTER</button>
            
            <p id="login-error" class="text-red-500 text-sm hidden mb-2">Erreur de connexion</p>

            <!-- LIEN RETOUR VERS INDEX -->
            <a href="index.html" class="text-sm text-neonBlue hover:underline transition">← Retour au site</a>
        </div>
    </div>

    <!-- TABLEAU DE BORD -->
    <div id="dashboard" class="hidden p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <!-- LIEN RETOUR VERS INDEX (DASHBOARD) -->
                <a href="index.html" class="text-gray-600 dark:text-gray-400 hover:text-neonBlue transition flex items-center gap-1 font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Retour
                </a>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Gestion des Produits</h1>
            </div>
            
            <div class="flex gap-4">
                <!-- Bouton Thème -->
                <button onclick="toggleTheme()" class="p-2 rounded-full border border-gray-300 dark:border-white/20 hover:bg-gray-200 dark:hover:bg-white/10 transition text-gray-800 dark:text-white">
                    <svg class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>

                <button onclick="openModal()" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded font-bold flex items-center gap-2">
                    + NOUVEAU PRODUIT
                </button>
                <button onclick="logout()" class="border border-red-500 text-red-600 dark:text-red-500 px-4 py-2 rounded hover:bg-red-500 hover:text-white transition">DÉCONNEXION</button>
            </div>
        </div>

        <div class="glass rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400 text-sm uppercase bg-gray-50 dark:bg-white/5">
                            <th class="p-4">Image</th>
                            <th class="p-4">Nom</th>
                            <th class="p-4">Prix</th>
                            <th class="p-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="product-list" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity">
        <div class="glass p-6 rounded-xl w-full max-w-lg relative m-4">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-red-500 text-xl transition">✕</button>
            
            <h2 id="modal-title" class="text-xl font-bold mb-4 text-neonBlue font-orbitron">Ajouter un produit</h2>
            
            <input type="hidden" id="edit-id">
            
            <label class="block text-gray-600 dark:text-gray-400 text-sm mb-1">Nom</label>
            <input type="text" id="p-name" class="input-field mb-4 rounded-lg">
            
            <label class="block text-gray-600 dark:text-gray-400 text-sm mb-1">Prix</label>
            <input type="number" id="p-price" class="input-field mb-4 rounded-lg">
            
            <label class="block text-gray-600 dark:text-gray-400 text-sm mb-1">Description</label>
            <textarea id="p-desc" rows="3" class="input-field mb-4 rounded-lg"></textarea>
            
            <label class="block text-gray-600 dark:text-gray-400 text-sm mb-1">Image URL</label>
            <input type="text" id="p-img" class="input-field mb-4 rounded-lg" placeholder="https://...">

            <button onclick="saveProduct()" class="w-full bg-neonBlue text-black font-bold py-3 rounded hover:bg-white transition mt-2">ENREGISTRER</button>
        </div>
    </div>

    <!-- LOGIQUE JAVASCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://fjietucyqdolguxgpvpr.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqaWV0dWN5cWRvbGd1eGdwdnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODU0OTIsImV4cCI6MjA5NTA2MTQ5Mn0.RRRQKtvzBhdYA7IsOgRL3rUgm1ybafXJkS1bUrzjbxY';                  
        const adminClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = checkSession;

        async function checkSession() {
            const { data: { session } } = await adminClient.auth.getSession();
            if (session) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                fetchProducts();
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("Champs requis");

            const { data, error } = await adminClient.auth.signInWithPassword({ email, password });
            if (error) {
                document.getElementById('login-error').classList.remove('hidden');
                document.getElementById('login-error').innerText = error.message;
            } else {
                window.location.reload(); 
            }
        }

        async function logout() {
            await adminClient.auth.signOut();
            window.location.reload();
        }

        async function fetchProducts() {
            const { data, error } = await adminClient.from('products').select('*').order('created_at', { ascending: false });
            if(error) return console.error(error);
            const tbody = document.getElementById('product-list');
            tbody.innerHTML = '';
            data.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-200 dark:border-gray-800 hover-row transition";
                tr.innerHTML = `
                    <td class="p-4"><img src="${p.image_url}" class="w-12 h-12 object-cover rounded bg-gray-200 dark:bg-gray-700 border border-gray-300 dark:border-gray-600"></td>
                    <td class="p-4 font-bold text-gray-900 dark:text-white">${p.name}</td>
                    <td class="p-4 text-neonBlue font-bold">${p.price} FCFA</td>
                    <td class="p-4 flex flex-col gap-2">
                        <!-- MODIFICATION: flex-col au lieu de flex gap-2 (Alignement vertical) -->
                        <button onclick='editProduct(${JSON.stringify(p)})' class="bg-blue-100 hover:bg-blue-600 text-blue-700 hover:text-white px-3 py-1 rounded text-xs font-bold transition w-full text-center">MODIFIER</button>
                        <button onclick="deleteProduct('${p.id}')" class="bg-red-100 hover:bg-red-600 text-red-700 hover:text-white px-3 py-1 rounded text-xs font-bold transition w-full text-center">SUPPRIMER</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function saveProduct() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const desc = document.getElementById('p-desc').value;
            const img = document.getElementById('p-img').value;

            if(!name || !price) return alert("Nom et Prix requis");

            if (id) {
                await adminClient.from('products').update({ name, price, description: desc, image_url: img }).eq('id', id);
            } else {
                await adminClient.from('products').insert([{ name, price, description: desc, image_url: img, is_active: true }]);
            }
            closeModal();
            fetchProducts();
        }

        async function deleteProduct(id) {
            if(confirm("Supprimer ?")) {
                await adminClient.from('products').delete().eq('id', id);
                fetchProducts();
            }
        }

        function openModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.getElementById('edit-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-img').value = '';
            document.getElementById('modal-title').innerText = "Ajouter un produit";
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function editProduct(product) {
            openModal();
            document.getElementById('modal-title').innerText = "Modifier";
            document.getElementById('edit-id').value = product.id;
            document.getElementById('p-name').value = product.name;
            document.getElementById('p-price').value = product.price;
            document.getElementById('p-desc').value = product.description;
            document.getElementById('p-img').value = product.image_url;
        }
    </script>
    
    <script>
        function initTheme() {
            if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }
        initTheme();
    </script>
</body>
</html>
